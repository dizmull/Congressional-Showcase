name: Add My Project
description: Submit your Congressional App Challenge project to the showcase
title: "Add Project: [App Name] by [Your Name]"
labels: ["new-project"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting your project! Fill out the form below and a maintainer will add your page to the showcase.

  - type: input
    id: name
    attributes:
      label: Your Full Name
      placeholder: e.g. Jane Doe
    validations:
      required: true

  - type: input
    id: app-name
    attributes:
      label: App Name
      description: The name of the app you built for the Congressional App Challenge.
      placeholder: e.g. EcoTracker
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: One-Sentence Description
      description: A short summary of what your app does.
      placeholder: e.g. An app that helps students track their carbon footprint and find ways to reduce it.
    validations:
      required: true

  - type: textarea
    id: about-you
    attributes:
      label: About You
      description: A few sentences about yourself. What school do you go to? What are you passionate about? What got you into coding?
      placeholder: |
        I'm a junior at Lincoln High School in Austin, TX. I started coding in 9th grade
        when I built a website for my school's robotics club...
    validations:
      required: true

  - type: textarea
    id: about-app
    attributes:
      label: About Your App
      description: What does your app do? Who is it for? What problem does it solve? What technologies did you use?
      placeholder: |
        EcoTracker helps students measure and reduce their carbon footprint. It uses React
        for the frontend and Firebase for the backend...
    validations:
      required: true

  - type: input
    id: demo-video
    attributes:
      label: Demo Video URL
      description: A YouTube or Vimeo link to your demo video.
      placeholder: e.g. https://www.youtube.com/watch?v=abc123
    validations:
      required: true

  - type: input
    id: location
    attributes:
      label: City and State
      description: Where are you from? This is used to place your pin on the map.
      placeholder: e.g. Austin, TX
    validations:
      required: true

  - type: input
    id: district
    attributes:
      label: Congressional District
      description: "Your congressional district (e.g. TX-21). This is used as your page's folder name. Find yours at: https://www.house.gov/representatives/find-your-representative"
      placeholder: e.g. TX-21
    validations:
      required: true

  - type: input
    id: github-repo
    attributes:
      label: GitHub Repo
      description: Optional. A link to your app's source code.
      placeholder: e.g. https://github.com/janedoe/ecotracker

  - type: input
    id: live-app
    attributes:
      label: Live App Link
      description: Optional. A link to your deployed app, if it's online.
      placeholder: e.g. https://ecotracker.app

  - type: textarea
    id: thumbnail
    attributes:
      label: Thumbnail Image
      description: "Optional. Drag and drop a screenshot or logo here (600x400 pixels recommended). This will appear on the showcase map."

  - type: checkboxes
    id: tags
    attributes:
      label: Categories
      description: Optional. Select any that apply to your app.
      options:
        - label: Education
        - label: Health
        - label: Environment
        - label: Civic / Government
        - label: Social
        - label: AI / Machine Learning
        - label: Games
        - label: Accessibility
        - label: Finance
        - label: Other
