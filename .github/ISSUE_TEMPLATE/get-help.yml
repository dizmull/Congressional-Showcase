name: Get Help
description: Stuck on something? Ask for help here.
labels: ["help"]
body:
  - type: markdown
    attributes:
      value: |
        No question is too small — we're happy to help!

  - type: textarea
    id: what-trying
    attributes:
      label: What are you trying to do?
      placeholder: e.g. I'm trying to add my project page but I'm not sure how to edit the JSON file.
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Describe what went wrong, or paste any error messages you saw.
      placeholder: e.g. When I open my page it shows a blank screen...
    validations:
      required: true

  - type: textarea
    id: screenshot
    attributes:
      label: Screenshot
      description: Optional. Drag and drop a screenshot here if it helps explain the problem.
